name: build

# Builds the all-in-one odysseus-omnibus image (app + chromadb + searxng + ntfy)
# and pushes multi-arch (amd64 + arm64) manifests to GHCR, in TWO channels with
# different sources (set per-channel in the matrix below):
#
#   :latest  <- our FORK's `main` branch     (you Sync-fork from upstream after
#                                              review; the fork is the buffer)
#   :edge    <- upstream `main` directly      (bleeding edge, no review gate)
#
# Only `:latest` routes through the fork - that's the channel that benefits from
# a review buffer. `:edge` is the deliberately-unreviewed channel, so it builds
# straight from upstream; no fork `track` branch or sync automation is involved.
# The companion service pins (ntfy/searxng/chroma) live in image/Dockerfile and
# are bumped there; this workflow only drives the per-channel Odysseus source.
#
# Each arch builds on a native GitHub-hosted runner (no QEMU); a per-channel
# merge job then stitches the manifest list. fail-fast: false keeps one
# channel/arch going if another fails.
#
# NOTE: the arm64 runner (ubuntu-24.04-arm) is free only in PUBLIC repos.

on:
  workflow_dispatch:
    inputs:
      latest_ref:
        description: "Override the :latest source ref on the fork (blank = main)"
        required: false
        default: ""
      edge_ref:
        description: "Override the :edge source ref on upstream (blank = main)"
        required: false
        default: ""
  schedule:
    - cron: "0 4 * * 1" # weekly - pick up app + base-image patches
  push:
    branches: [main]
    paths:
      - "image/**"
      - ".github/workflows/build.yml"

env:
  IMAGE: ghcr.io/ktmetcalfe/odysseus-omnibus

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        channel:
          - tag: latest
            repo: https://github.com/KTMetcalfe/odysseus.git
            ref: main
          - tag: edge
            repo: https://github.com/pewdiepie-archdaemon/odysseus.git
            ref: main
        platform:
          - name: linux/amd64
            runner: ubuntu-latest
          - name: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Prepare platform pair
        env:
          PLATFORM: ${{ matrix.platform.name }}
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5

      - name: Resolve channel ref
        id: ref
        env:
          # Via env (not inline ${{ }}) so dispatch inputs can't inject shell.
          DEFAULT_REF: ${{ matrix.channel.ref }}
          TAG: ${{ matrix.channel.tag }}
          LATEST_OVERRIDE: ${{ github.event.inputs.latest_ref }}
          EDGE_OVERRIDE: ${{ github.event.inputs.edge_ref }}
        run: |
          override=""
          [ "$TAG" = latest ] && override="$LATEST_OVERRIDE"
          [ "$TAG" = edge ] && override="$EDGE_OVERRIDE"
          echo "value=${override:-$DEFAULT_REF}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: image
          file: image/Dockerfile
          platforms: ${{ matrix.platform.name }}
          # No provenance/SBOM attestations: they add "unknown/unknown" entries
          # to the manifest list on GHCR. Harmless, but ugly. Set true to keep
          # supply-chain provenance.
          provenance: false
          sbom: false
          build-args: |
            ODYSSEUS_REPO=${{ matrix.channel.repo }}
            ODYSSEUS_REF=${{ steps.ref.outputs.value }}
          labels: |
            org.opencontainers.image.source=https://github.com/KTMetcalfe/odysseus-unraid
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.channel.tag }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=${{ matrix.channel.tag }}-${{ env.PLATFORM_PAIR }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.channel.tag }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        channel: [latest, edge]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.channel }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.IMAGE }}
          TAG: ${{ matrix.channel }}
        run: |
          # If this channel's build failed (e.g. source ref missing), no
          # digests were uploaded - skip rather than fail the whole run.
          if [ -z "$(ls -A 2>/dev/null)" ]; then
            echo "No digests for :$TAG - skipping (did this channel's build succeed?)."
            exit 0
          fi
          docker buildx imagetools create -t "${IMAGE}:${TAG}" \
            $(printf "${IMAGE}@sha256:%s " *)
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
