[supervisord]
nodaemon=true
user=root
pidfile=/run/supervisord.pid
logfile=/dev/null
logfile_maxbytes=0

[unix_http_server]
file=/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///run/supervisor.sock

# Per-service program definitions are generated at boot by
# omnibus-entrypoint.sh into conf.d (so EMBED_* toggles can include or omit
# each one).
[include]
files = /etc/supervisor/conf.d/*.conf
